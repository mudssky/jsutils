name: sync-release-artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Published release tag, for example v1.35.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-sync-${{ inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-release-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: fetch tags
        run: git fetch --force --tags origin

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: sync release artifacts
        env:
          # 由 release workflow 显式调度，手动补跑时也复用同一入口。
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: node scripts/sync-release-artifacts.mjs

      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: commit synced artifacts
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git add package.json CHANGELOG.md

          if git diff --cached --quiet; then
            echo "release-sync: no changes to commit"
            exit 0
          fi

          git commit -m "chore(release-sync): ${RELEASE_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
