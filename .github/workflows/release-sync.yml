name: sync-release-artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Published release tag, for example v1.35.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-sync-${{ github.event.release.tag_name || inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-release-artifacts:
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.draft && !github.event.release.prerelease) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: fetch tags
        run: git fetch --force --tags origin

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: sync release artifacts
        env:
          # 默认使用 GITHUB_TOKEN 回写，避免同步提交再次触发 release workflow。
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node scripts/sync-release-artifacts.mjs

      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: commit synced artifacts
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          git add package.json CHANGELOG.md

          if git diff --cached --quiet; then
            echo "release-sync: no changes to commit"
            exit 0
          fi

          git commit -m "chore(release-sync): ${RELEASE_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
