version: 2
updates:
    # 针对 GitHub Actions 的更新配置
    - package-ecosystem: "github-actions"
      # 扫描 workflow 文件的目录，固定为 /
      directory: "/"
      # 自动检查更新的频率：weekly(每周)/daily(每日)/monthly(每月)
      schedule:
          interval: "monthly"
      # 单次最多打开的PR数量，默认5，可按需调高
      open-pull-requests-limit: 20
      # 版本策略：increase 保持语义化版本升级
      versioning-strategy: increase

      # 【关键批量优化】分组升级，避免一个Action一个PR
      groups:
          # 非破坏性的小版本/补丁版本，合并为一个PR
          actions-non-breaking:
              update-types:
                  - "minor"
                  - "patch"
          # 主版本升级（可能有破坏性变更），单独一个PR
          actions-major:
              update-types:
                  - "major"
