version: 2
updates:
  # GitHub Actions 依赖按月检查，并限制同一时间最多 2 个 PR。
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 2
    groups:
      # 非破坏性更新合并，避免一个 Action 一个 PR。
      actions-non-breaking:
        update-types:
          - 'minor'
          - 'patch'

  # npm 依赖改为按月检查，并把 major/minor/patch 分成最多 2 个批次。
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:30'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 2
    groups:
      # 所有非破坏性更新合并为一个 PR。
      non-breaking:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
  
